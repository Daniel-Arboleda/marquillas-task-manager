name: marquillas-task-manager

services:
  backend:
    build:
      context: ./backend
    container_name: marquillas_backend
    environment:
      APP_NAME: "Marquillas Task Manager API"
      APP_ENV: "development"
      APP_DEBUG: "false"
      DATABASE_HOST: "sqlserver"
      DATABASE_PORT: "1433"
      DATABASE_NAME: "marquillas_tasks"
      DATABASE_USER: "sa"
      DATABASE_PASSWORD: "${MSSQL_SA_PASSWORD}"
      DATABASE_DRIVER: "ODBC Driver 18 for SQL Server"
      DATABASE_ENCRYPT: "true"
      DATABASE_TRUST_SERVER_CERTIFICATE: "true"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      JWT_ALGORITHM: "${JWT_ALGORITHM}"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: marquillas_frontend
    ports:
      - "5173:80"
    restart: unless-stopped

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: marquillas_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    ports:
      - "1433:1433"
    volumes:
      - marquillas_sqlserver_data:/var/opt/mssql
    restart: unless-stopped

volumes:
  marquillas_sqlserver_data:
    name: marquillas_sqlserver_data